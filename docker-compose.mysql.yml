# Optional stack: MySQL 8 (DMA-style) — use when migrating off PostgreSQL.
# 1) Place your official DMA dump as ./db/radius_dma_full.sql (phpMyAdmin / mysqldump of database `radius`).
# 2) Run: docker compose -f docker-compose.mysql.yml up -d mysql
# 3) Point the future Node API at: mysql://radius:radius123@127.0.0.1:3306/radius
#
# The API in this repo still expects PostgreSQL until all routes/queries are rewritten for MySQL + DMA tables.

name: prince_radius_saas_mysql

services:
  mysql:
    image: public.ecr.aws/docker/library/mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_pass
      MYSQL_DATABASE: radius
      MYSQL_USER: radius
      MYSQL_PASSWORD: radius123
    ports:
      - "3306:3306"
    volumes:
      - mysql_dma_data:/var/lib/mysql
      # Init: only runs on first empty volume. Use your full DMA `radius` schema + data export.
      - ./db/radius_dma_full.sql:/docker-entrypoint-initdb.d/01-radius.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uradius", "-pradius123"]
      interval: 5s
      timeout: 5s
      retries: 30
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password

volumes:
  mysql_dma_data:
