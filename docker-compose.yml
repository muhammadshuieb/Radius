# Production-oriented stack for VPS (e.g. Hostinger Docker Manager).
#
# On the VPS, set in `.env` (or the panel) before `docker compose up --build`:
#   POSTGRES_PASSWORD=<strong secret>   # Same value is injected into DATABASE_URL for api/worker/db-migrate
#   VPS_IP=<your-public-ip-or-hostname> # Used for web build: VITE_API_URL=http://$VPS_IP:4000
#   JWT_SECRET=<long random string>
# If POSTGRES_PASSWORD contains @ : / ? # encode it for DATABASE_URL or use a URL-safe password.

name: prince_radius_saas

services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    command: postgres
    restart: unless-stopped
    # Helps default shared_buffers fit default 64MB /dev/shm on some VPS panels (avoids silent crash → "unhealthy").
    shm_size: 256mb
    environment:
      POSTGRES_USER: prince
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prince_dev_pass}
      POSTGRES_DB: radius_saas
    volumes:
      - pg_data_v2:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # start_period: first boot runs large init.sql; avoid marking unhealthy during bootstrap.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prince -d radius_saas"]
      interval: 10s
      timeout: 15s
      retries: 30
      start_period: 120s

  db-migrate:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-prince_dev_pass}
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      "set -e && until pg_isready -h postgres -U prince -d radius_saas; do sleep 1; done && psql -h postgres -U prince -d radius_saas -v ON_ERROR_STOP=1 -f /migrations/002_radius_accounting.sql && echo db-migrate OK"

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_API_PORT: "3000"
      WAHA_API_KEY: ${WAHA_API_KEY:-change-me-waha-api-key}
      WAHA_BASE_URL: http://localhost:3000
      WAHA_LOCAL_STORE_BASE_DIR: /app/.sessions
      WHATSAPP_START_SESSION: ${WAHA_SESSION_NAME:-default}
    volumes:
      - waha_sessions:/app/.sessions

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      LISTEN_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://prince:${POSTGRES_PASSWORD:-prince_dev_pass}@postgres:5432/radius_saas
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
      NODE_ENV: production
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:-change-me-waha-api-key}
      WAHA_SESSION_NAME: ${WAHA_SESSION_NAME:-default}
    # curl is faster than spawning node; generous timeouts for slow VPS (node -e + fetch often hit Docker's default 5s cap).
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 20s
      retries: 25
      start_period: 300s
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      waha:
        condition: service_started

  worker:
    build:
      context: ./apps/api
    command: ["node", "dist/worker.js"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://prince:${POSTGRES_PASSWORD:-prince_dev_pass}@postgres:5432/radius_saas
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      api:
        condition: service_started

  web:
    build:
      context: ./apps/web
      args:
        # Browser must call the public host: set VPS_IP to your VPS public IP or DNS name (same as users type in the URL bar).
        # Override full URL if needed: docker compose build web --build-arg VITE_API_URL=https://api.example.com
        VITE_API_URL: http://${VPS_IP:-localhost}:4000
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      VITE_PROXY_TARGET: http://api:4000
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data_v2:
  waha_sessions:
